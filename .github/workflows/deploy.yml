name: Deploy to Production
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 20m
          script: |
            set -e
            cd /var/www/html/skyforest.by
            [ -d .git ] || { echo "ОШИБКА: папка .git отсутствует — репозиторий нужно восстановить вручную"; exit 1; }
            echo "==> Pulling latest changes..."
            # npm install на сервере правит package-lock.json, из-за чего обычный
            # git pull падал ("local changes would be overwritten"). Локальных
            # коммитов на сервере нет — жёстко сбрасываемся на origin/main.
            git fetch origin main
            git reset --hard origin/main

            echo "==> Diagnostics (раскладка сервера)..."
            echo "--- содержимое корня ---"
            ls -la | head -30
            echo "--- package.json в корне (старая плоская копия?) ---"
            grep -E '"(name|version)"' package.json 2>/dev/null || echo "package.json в корне отсутствует"
            echo "--- процесс PM2 ---"
            pm2 describe skyforest.by | grep -iE "exec cwd|script path|script args|status|node" || echo "pm2 describe не дал данных"

            echo "==> Ensuring .env is available in skyforest/ ..."
            if [ ! -e skyforest/.env ] && [ -f .env ]; then ln -s ../.env skyforest/.env; fi

            # Приложение живёт в подпапке skyforest/ репозитория.
            # Сборка из корня подхватывает устаревшую плоскую копию (src/ без новых
            # модулей) и валится на typecheck — поэтому строго cd skyforest.
            cd skyforest
            echo "==> Installing dependencies..."
            npm install
            echo "==> Building Next.js..."
            npm run build
            echo "==> Restarting PM2..."
            pm2 restart skyforest.by --update-env
            echo "==> Done!"

<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <title>SkyForest — офлайн</title>
    <link rel="stylesheet" href="./vendor/leaflet/leaflet.css" />
    <style>
      :root {
        --bg: #0f1a12;
        --panel: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.12);
        --text: #e8f0ea;
        --muted: rgba(232, 240, 234, 0.65);
        --primary: #62a863;
        --emerald: #10b981;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, Roboto, system-ui, sans-serif;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100%;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 16px;
      }
      header h1 { font-size: 15px; margin: 0; font-weight: 700; }
      header .badge {
        font-size: 11px;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 3px 8px;
      }
      .stats {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding: 0 16px 12px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 12px 14px;
      }
      .card .label { font-size: 11px; color: var(--muted); }
      .card .value { font-size: 22px; font-weight: 800; margin-top: 2px; }
      .card .value.accent { color: var(--primary); }
      .compass {
        display: flex;
        align-items: center;
        gap: 14px;
        margin: 0 16px 12px;
        padding: 14px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
      }
      .dial {
        width: 84px; height: 84px; flex: 0 0 84px;
        border-radius: 50%;
        border: 2px solid rgba(98, 168, 99, 0.3);
        background: rgba(98, 168, 99, 0.06);
        display: flex; align-items: center; justify-content: center;
      }
      .arrow { transition: transform 0.3s ease-out; }
      .compass .info { min-width: 0; }
      .compass .dir { font-size: 14px; font-weight: 600; }
      .compass .hint { font-size: 11px; color: var(--muted); margin-top: 4px; }
      #enableCompass {
        margin-top: 8px;
        font-size: 12px;
        color: var(--emerald);
        background: rgba(16, 185, 129, 0.15);
        border: none;
        border-radius: 10px;
        padding: 8px 12px;
        cursor: pointer;
      }
      #map { flex: 1 1 auto; width: 100%; background: #0b130d; }
      .empty {
        flex: 1 1 auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        text-align: center;
        padding: 24px;
      }
      .empty p { color: var(--muted); font-size: 14px; margin: 0; max-width: 320px; }
      .btn {
        background: var(--primary);
        color: #0b130d;
        border: none;
        border-radius: 14px;
        padding: 12px 20px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
      }
      .hidden { display: none !important; }
      .leaflet-container { background: #0b130d; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <h1 id="t-title">Возврат к точке входа</h1>
        <span class="badge" id="t-offline">Офлайн</span>
      </header>

      <div id="active" class="hidden" style="display: flex; flex-direction: column; flex: 1 1 auto; min-height: 0;">
        <div class="stats">
          <div class="card">
            <div class="label" id="t-distance">До входа</div>
            <div class="value accent" id="distance">—</div>
          </div>
          <div class="card">
            <div class="label" id="t-duration">В лесу</div>
            <div class="value" id="duration">0:00</div>
          </div>
        </div>

        <div class="compass">
          <div class="dial">
            <div class="arrow" id="arrow">
              <svg viewBox="0 0 24 24" width="52" height="52" aria-hidden="true">
                <path d="M12 2 L20 20 L12 15.5 L4 20 Z" fill="#8fd18f" stroke="#8fd18f" stroke-width="1" stroke-linejoin="round" />
              </svg>
            </div>
          </div>
          <div class="info">
            <div class="dir" id="dir">Определяем направление…</div>
            <div class="hint" id="hint">Пройдите несколько шагов — направление определится по GPS.</div>
            <button id="enableCompass" class="hidden">Включить компас</button>
          </div>
        </div>

        <div id="map"></div>
      </div>

      <div id="empty" class="empty">
        <p id="t-empty">Активный поход не найден. Откройте приложение при интернете и начните поход, чтобы пользоваться офлайн-возвратом.</p>
        <button class="btn" id="openApp">Открыть приложение</button>
      </div>
    </div>

    <script src="./vendor/leaflet/leaflet.js"></script>
    <script src="./offline-track.js"></script>
  </body>
</html>

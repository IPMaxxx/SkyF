<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1"
    />
    <title>SkyForest</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0f1a12;
        color: #e8f0ea;
        font-family: -apple-system, Roboto, system-ui, sans-serif;
      }
      .wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        gap: 16px;
        text-align: center;
        padding: 24px;
      }
      .spinner {
        width: 42px;
        height: 42px;
        border: 3px solid rgba(98, 168, 99, 0.25);
        border-top-color: #62a863;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      p {
        opacity: 0.7;
        font-size: 15px;
      }
      .actions {
        display: none;
        flex-direction: column;
        gap: 12px;
        width: 100%;
        max-width: 320px;
      }
      .actions.show { display: flex; }
      .btn {
        border: none;
        border-radius: 14px;
        padding: 13px 20px;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        text-decoration: none;
        text-align: center;
      }
      .btn-primary { background: #62a863; color: #0b130d; }
      .btn-ghost {
        background: transparent;
        color: #e8f0ea;
        border: 1px solid rgba(232, 240, 234, 0.25);
      }
    </style>
  </head>
  <body>
    <!--
      Это резервная оболочка. В штатном режиме WebView открывает https://skyforest.ai
      (см. server.url в capacitor.config.ts). Экран показывается только если
      боевой сервер недоступен — тогда предлагаем автономный офлайн-экран Track.
    -->
    <div class="wrap">
      <div class="spinner" id="spinner"></div>
      <p id="msg">Loading SkyForest…</p>
      <div class="actions" id="actions">
        <a class="btn btn-primary" href="./offline-track.html" id="btnOffline">Open offline map</a>
        <a class="btn btn-ghost" href="https://skyforest.ai/dashboard/track" id="btnRetry">Retry connection</a>
      </div>
    </div>

    <script>
      (function () {
        // Нативный splash не прячется автоматически — прячем его здесь.
        var cap = window.Capacitor;
        if (cap && cap.Plugins && cap.Plugins.SplashScreen) {
          cap.Plugins.SplashScreen.hide({ fadeOutDuration: 250 }).catch(function () {});
        }
        var ru = String(navigator.language || "").toLowerCase().indexOf("ru") === 0;
        // Небольшая пауза: даём шанс WebView перейти на боевой сайт; если через
        // 3 секунды всё ещё здесь — сервер недоступен, показываем офлайн-опции.
        setTimeout(function () {
          document.getElementById("spinner").style.display = "none";
          document.getElementById("msg").textContent = ru
            ? "Нет связи с сервером. Доступен офлайн-режим:"
            : "Can't reach the server. Offline mode is available:";
          document.getElementById("btnOffline").textContent = ru ? "Открыть офлайн-карту" : "Open offline map";
          document.getElementById("btnRetry").textContent = ru ? "Повторить подключение" : "Retry connection";
          document.getElementById("actions").classList.add("show");
        }, 3000);
      })();
    </script>
  </body>
</html>
